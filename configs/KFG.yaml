  - sample_data/fallAndGetUp1_subject4_310_528.npz
  # fight1 subject3ff
  - sample_data/fight1_subject3_4720_4938.npz
  - sample_data/fight1_subject3_6400_6618.npz
  # ground1 subject4
  - sample_data/ground1_subject4_3880_4098.npz
  # jump1 subject5
  - sample_data/jumps1_subject5_100_318.npz
  - sample_data/jumps1_subject5_6190_6408.npz
  # obstacles4 subject2
  - sample_data/obstacles4_subject2_310_528.npz
  # run1 subject5
  - sample_data/run1_subject5_4930_5148.npz
  - sample_data/run1_subject5_100_318.npz
  # walk2 subject4
  - sample_data/walk2_subject4_4300_4518.npz
